# MeowVPN microservices — root compose
# Usage: docker compose --profile full up -d
# Services: api, frontend (Next SSR), docs (Docusaurus), mysql, redis, bots

name: meowvpn

services:
  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - svp_storage:/var/www/html/storage
      - svp_backups:/var/www/html/storage/app/backups
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-meowvpn}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_COOKIE: simplevpbot_session
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000,localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SVP_BOT_SERVICE_SECRET: ${SVP_BOT_SERVICE_SECRET:-change-me-bot-service-secret}
      SVP_LEGACY_WEBHOOK_ON_BACKEND: ${SVP_LEGACY_WEBHOOK_ON_BACKEND:-false}
      SVP_XRAY_AGENT_URL: ${SVP_XRAY_AGENT_URL:-http://xray-agent:8444}
      SVP_XRAY_PUBLIC_IP: ${SVP_XRAY_PUBLIC_IP:-}
      SVP_MODULE_PASARGUARD: ${SVP_MODULE_PASARGUARD:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meowvpn
    expose:
      - "9000"

  web:
    image: nginx:1.27-alpine
    ports:
      - "${API_HTTP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - meowvpn

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
      API_INTERNAL_BASE: ${API_INTERNAL_BASE:-http://web/api/v1}
      NODE_ENV: production
    ports:
      - "${FRONTEND_HTTP_PORT:-3000}:3000"
    depends_on:
      - web
    networks:
      - meowvpn

  docs:
    build:
      context: ./documentation
      dockerfile: Dockerfile
    ports:
      - "${DOCS_HTTP_PORT:-3002}:80"
    networks:
      - meowvpn

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-meowvpn}
      MYSQL_USER: ${DB_USERNAME:-svp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - svp_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-svp}", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - meowvpn

  redis:
    image: redis:7-alpine
    volumes:
      - svp_redis:/data
    networks:
      - meowvpn

  queue-worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    command: php artisan queue:work redis --sleep=1 --tries=3
    volumes:
      - ./backend:/var/www/html
      - svp_storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-meowvpn}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      SVP_BOT_SERVICE_SECRET: ${SVP_BOT_SERVICE_SECRET:-change-me-bot-service-secret}
    depends_on:
      - api
      - redis
    networks:
      - meowvpn
    profiles:
      - workers
      - full

  scheduler:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-meowvpn}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - api
    networks:
      - meowvpn
    profiles:
      - workers
      - full

  telegram-bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    ports:
      - "${TELEGRAM_BOT_PORT:-8091}:8091"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://web}
      SVP_BOT_SERVICE_SECRET: ${SVP_BOT_SERVICE_SECRET:-change-me-bot-service-secret}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_SECRET_HEADER: ${TELEGRAM_SECRET_HEADER:-}
    depends_on:
      - web
    networks:
      - meowvpn
    profiles:
      - telegram
      - full

  bale-bot:
    build:
      context: .
      dockerfile: bale_bot/Dockerfile
    ports:
      - "${BALE_BOT_PORT:-8092}:8092"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://web}
      SVP_BOT_SERVICE_SECRET: ${SVP_BOT_SERVICE_SECRET:-change-me-bot-service-secret}
      BALE_WEBHOOK_SECRET: ${BALE_WEBHOOK_SECRET:-}
    depends_on:
      - web
    networks:
      - meowvpn
    profiles:
      - bale
      - full

  xray-agent:
    build:
      context: ./node-agent
      dockerfile: Dockerfile
    volumes:
      - xray_config:/etc/xray
    networks:
      - meowvpn
    restart: unless-stopped
    profiles:
      - xray
      - full

volumes:
  svp_mysql:
  svp_redis:
  svp_storage:
  svp_backups:
  xray_config:

networks:
  meowvpn:
    driver: bridge
